<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #070a12;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .glow-1 {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, #00f2fe, #3b82f6);
    filter: blur(120px); opacity: 0.15; top: -100px; left: -100px;
  }
  .glow-2 {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, #8b5cf6, #ec4899);
    filter: blur(120px); opacity: 0.12; bottom: -80px; right: -80px;
  }
  .card {
    position: relative; z-index: 1;
    width: 1080px; height: 510px;
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 60px 70px;
    display: flex; flex-direction: column; justify-content: center;
    backdrop-filter: blur(20px);
  }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: #00f2fe;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Outfit', sans-serif;
    font-size: 52px; font-weight: 800;
    color: #f1f5f9;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .role {
    font-size: 22px; font-weight: 600;
    color: #3b82f6;
    margin-bottom: 30px;
  }
  .desc {
    font-size: 18px; color: #94a3b8;
    line-height: 1.6;
    max-width: 700px;
  }
  .url {
    position: absolute;
    bottom: 40px; right: 70px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: #64748b;
  }
</style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="card">
    <div class="tag">Portfolio</div>
    <h1>Christopher Israel<br>"OdiBa" Ahiome</h1>
    <div class="role">Backend &amp; AI Systems Engineer</div>
    <div class="desc">Financial infrastructure, blockchain systems, and AI-enabled platforms.</div>
    <div class="url">odiba-portfolio.vercel.app</div>
  </div>
</body>
</html>
