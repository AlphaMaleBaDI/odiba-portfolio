<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="#070a12"/>
  <!-- Glowing Border -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#fav-grad)" stroke-width="2.5" opacity="0.85"/>
  <!-- Terminal Prompt Symbol (> _) -->
  <path d="M 18 22 L 28 32 L 18 42" fill="none" stroke="url(#fav-grad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <line x1="32" y1="42" x2="46" y2="42" stroke="url(#fav-grad)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>
</svg>
